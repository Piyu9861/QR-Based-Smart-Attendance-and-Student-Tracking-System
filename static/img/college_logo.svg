<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer ring - Navy Blue (exact college color) -->
  <circle cx="100" cy="100" r="98" fill="#1a3a6b" stroke="#c8a84b" stroke-width="4"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#c8a84b" stroke-width="1.5"/>
  
  <!-- Lamp/Torch (knowledge symbol) -->
  <ellipse cx="100" cy="52" rx="14" ry="20" fill="#c8a84b" opacity="0.9"/>
  <ellipse cx="100" cy="48" rx="9" ry="13" fill="#ffe066" opacity="0.85"/>
  <ellipse cx="100" cy="44" rx="5" ry="8" fill="#fff8dc" opacity="0.9"/>
  <rect x="94" y="68" width="12" height="22" rx="2" fill="#c8a84b"/>
  <rect x="90" y="88" width="20" height="4" rx="2" fill="#c8a84b"/>
  
  <!-- Open Book -->
  <path d="M55,108 Q100,100 100,100 Q100,100 145,108 L145,148 Q100,140 100,140 Q100,140 55,148 Z" fill="#c8a84b" opacity="0.9"/>
  <path d="M55,108 Q100,100 100,100 L100,140 Q100,140 55,148 Z" fill="#d4b560"/>
  <path d="M100,100 Q145,108 145,108 L145,148 Q100,140 100,140 Z" fill="#b8942e"/>
  <!-- Book spine -->
  <rect x="98" y="100" width="4" height="40" fill="#8b6914"/>
  <!-- Book lines -->
  <line x1="70" y1="118" x2="95" y2="115" stroke="#8b6914" stroke-width="1.5" opacity="0.7"/>
  <line x1="70" y1="126" x2="95" y2="123" stroke="#8b6914" stroke-width="1.5" opacity="0.7"/>
  <line x1="70" y1="134" x2="95" y2="131" stroke="#8b6914" stroke-width="1.5" opacity="0.7"/>
  <line x1="105" y1="115" x2="130" y2="118" stroke="#8b6914" stroke-width="1.5" opacity="0.7"/>
  <line x1="105" y1="123" x2="130" y2="126" stroke="#8b6914" stroke-width="1.5" opacity="0.7"/>
  <line x1="105" y1="131" x2="130" y2="134" stroke="#8b6914" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Text: K.P.PATIL -->
  <text x="100" y="163" font-family="Georgia, serif" font-size="15" fill="#c8a84b" 
        text-anchor="middle" font-weight="bold" letter-spacing="2">K.P.PATIL</text>
  <!-- Text: POLYTECHNIC -->
  <text x="100" y="178" font-family="Georgia, serif" font-size="10" fill="#e8d5a0" 
        text-anchor="middle" letter-spacing="1">POLYTECHNIC</text>
  <!-- Text: MUDAL -->
  <text x="100" y="191" font-family="Georgia, serif" font-size="9" fill="#a0b8d8" 
        text-anchor="middle" letter-spacing="1">MUDAL</text>
</svg>
