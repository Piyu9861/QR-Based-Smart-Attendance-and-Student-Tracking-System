{% extends 'base.html' %}
{% block title %}Add Department — K.P. Patil{% endblock %}
{% block topbar_title %}<i class="fas fa-plus" style="color:var(--gold)"></i> Add Department{% endblock %}
{% block sidebar_nav %}
<a class="nav-link" href="/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a class="nav-link active" href="/departments"><i class="fas fa-building"></i> Departments</a>
{% endblock %}
{% block content %}
<div class="section-hdr"><div class="section-hdr-left"><div class="sh-title">Add Department</div></div></div>
<div class="card" style="max-width:500px;">
  <form method="POST" action="/departments/store">
    <div class="form-group">
      <label class="form-label">Department Name *</label>
      <input class="form-input" type="text" name="department_name" placeholder="e.g. Computer Engineering" required>
    </div>
    <div class="form-group">
      <label class="form-label">Short Name</label>
      <input class="form-input" type="text" name="short_name" placeholder="e.g. COMP" maxlength="10">
    </div>
    <button type="submit" class="btn btn-gold" style="width:100%;">Save Department</button>
  </form>
</div>
{% endblock %}
