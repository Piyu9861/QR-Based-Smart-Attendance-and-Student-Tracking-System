{% extends 'base.html' %}
{% block title %}Add Subject — K.P. Patil{% endblock %}
{% block topbar_title %}<i class="fas fa-book" style="color:var(--gold)"></i> Add Subject{% endblock %}
{% block sidebar_nav %}
<a class="nav-link" href="/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a class="nav-link active" href="/subjects"><i class="fas fa-book"></i> Subjects</a>
{% endblock %}
{% block content %}
<div class="section-hdr"><div class="section-hdr-left"><div class="sh-title">Add Subject</div></div></div>
<div class="card" style="max-width:480px;">
  <form method="POST" action="/subjects/store">
    <div class="form-group">
      <label class="form-label">Subject Name *</label>
      <input class="form-input" type="text" name="subject_name" required>
    </div>
    <div class="form-group">
      <label class="form-label">Department *</label>
      <select class="form-input" name="department_id" required>
        <option value="">-- Select --</option>
        {% for d in depts %}<option value="{{ d.id }}">{{ d.department_name }}</option>{% endfor %}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group">
        <label class="form-label">Class</label>
        <select class="form-input" name="class">
          <option value="FY">FY</option><option value="SY">SY</option><option value="TY">TY</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Semester</label>
        <select class="form-input" name="semester">
          {% for i in range(1,7) %}<option value="{{ i }}">Sem {{ i }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn btn-gold" style="flex:1;">Add Subject</button>
      <a href="/subjects" class="btn btn-outline" style="flex:1;text-align:center;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
