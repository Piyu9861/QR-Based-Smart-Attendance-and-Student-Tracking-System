{% extends 'base.html' %}
{% block title %}Add Event — K.P. Patil{% endblock %}
{% block topbar_title %}<i class="fas fa-calendar-plus" style="color:var(--gold)"></i> Add Calendar Event{% endblock %}
{% block sidebar_nav %}
<a class="nav-link" href="/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a class="nav-link active" href="/calendar"><i class="fas fa-calendar"></i> Calendar</a>
{% endblock %}
{% block content %}
<div class="section-hdr"><div class="section-hdr-left"><div class="sh-title">Add Calendar Event</div><div class="sh-sub">HOD can add department-specific events</div></div></div>
<div class="card" style="max-width:520px;">
  <form method="POST" action="/calendar/store">
    <div class="form-group">
      <label class="form-label">Event Title *</label>
      <input class="form-input" type="text" name="title" required placeholder="e.g. Mid-Term Exam, Parents Meeting">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group">
        <label class="form-label">Date *</label>
        <input class="form-input" type="date" name="date" required>
      </div>
      <div class="form-group">
        <label class="form-label">Type</label>
        <select class="form-input" name="type">
          <option value="event">📅 Event</option>
          <option value="holiday">🏖️ Holiday</option>
          <option value="exam">📝 Exam</option>
          <option value="meeting">👥 Meeting</option>
          <option value="visit">🏭 Industrial Visit</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Department (leave blank for all depts)</label>
      <select class="form-input" name="department_id">
        <option value="">-- All Departments --</option>
        {% for d in depts %}<option value="{{ d.id }}" {% if session_dept and session_dept==d.id %}selected{% endif %}>{{ d.department_name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <input class="form-input" type="text" name="description" placeholder="Brief description of the event">
    </div>
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn btn-gold" style="flex:1;">Add Event</button>
      <a href="/calendar" class="btn btn-outline" style="flex:1;text-align:center;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
