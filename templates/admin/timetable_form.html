{% extends 'base.html' %}
{% block title %}Add Timetable Entry — K.P. Patil{% endblock %}
{% block topbar_title %}<i class="fas fa-calendar-plus" style="color:var(--gold)"></i> Add Timetable{% endblock %}
{% block sidebar_nav %}
<a class="nav-link" href="/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
<a class="nav-link active" href="/timetable"><i class="fas fa-calendar-alt"></i> Timetable</a>
{% endblock %}
{% block content %}
<div class="section-hdr"><div class="section-hdr-left"><div class="sh-title">Add Timetable Entry</div></div></div>
<div class="card" style="max-width:540px;">
  <form method="POST" action="/timetable/store">
    <div class="form-group">
      <label class="form-label">Class *</label>
      <select class="form-input" name="class_id" required>
        <option value="">-- Select Class --</option>
        {% for c in classes %}<option value="{{ c.id }}">{{ c.department_name }} — {{ c.class_name }} {{ c.division }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Subject *</label>
      <select class="form-input" name="subject_id" required>
        <option value="">-- Select Subject --</option>
        {% for s in subjects %}<option value="{{ s.id }}">{{ s.subject_name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Teacher *</label>
      <select class="form-input" name="teacher_id" required>
        <option value="">-- Select Teacher --</option>
        {% for t in teachers %}<option value="{{ t.id }}">{{ t.name }}</option>{% endfor %}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div class="form-group">
        <label class="form-label">Day</label>
        <select class="form-input" name="day">
          {% for d in ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'] %}
          <option value="{{ d }}">{{ d }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Time Slot</label>
        <input class="form-input" type="text" name="time_slot" placeholder="e.g. 09:00–10:00 AM">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Room No</label>
      <input class="form-input" type="text" name="room_no" placeholder="e.g. 101">
    </div>
    <div style="display:flex;gap:12px;">
      <button type="submit" class="btn btn-gold" style="flex:1;">Add Entry</button>
      <a href="/timetable" class="btn btn-outline" style="flex:1;text-align:center;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
